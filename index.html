<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOME</title>
  <style>
    :root {
      --bg: #101423;
      --card: #1d2440;
      --accent: #c275c2;
      --text: #f2f2f7;
      --muted: #b5b8c9;
      --line: #353c5f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Futura, "Futura", san serif;
      background: radial-gradient(circle at top, #1d2850 0%, var(--bg) 50%);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      border: 1px solid var(--line);
      background: linear-gradient(140deg, #2d3a73, #232c53);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px 0;
      color: var(--accent);
      font-weight: 500;
    }

    nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: #20294d;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
    }

    .muted { color: var(--muted); }

    .clock {
      font-size: 1.4rem;
      margin: 8px 0;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Welcome Home</h1>
      <p class="muted">A calm homepage for your shrine. Use the menu to explore other pages.</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="story.html">Timeline</a>
        <a href="rituals.html">Rituals</a>
        <a href="rules.html">Rules</a>
        <a href="tools.html">Small Tools</a>
      </nav>
    </header>

    <section class="grid">
      <article class="card">
        <h2 id="welcomeHeading">Hello</h2>
        <p class="muted">Your daily message appears based on the current time.</p>
      </article>

      <article class="card">
        <h2>Current Time</h2>
        <p id="clock" class="clock">--:--:--</p>
        <p id="dateLine" class="muted">Loading date…</p>
      </article>

      <article class="card">
        <h2>Daily Note</h2>
        <p id="dailyQuote">Click for today’s small reminder.</p>
        <button id="newQuoteBtn" type="button">New reminder</button>
      </article>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
