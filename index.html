<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="theme.css" />
  <title>HOME</title>
  </head>
<body>
  <main class="container">
    <header>
      <h1>Welcome Home</h1>
      <p class="muted">A calm homepage for your shrine. Use the menu to explore other pages.</p>
      <nav>
        <a href="pet.html">Tamagochi</a>
        <a href="planner.html">Week</a>
        <a href="rituals.html">Rituals</a>
        <a href="todo.html">To-do</a>
      </nav>
    </header>

    <section class="grid">
      <article class="card">
        <h2 id="welcomeHeading">Hello</h2>
        <p class="muted">Your daily message appears based on the current time.</p>
      </article>

      <article class="card">
        <h2>Current Time</h2>
        <p id="clock" class="clock">--:--:--</p>
        <p id="dateLine" class="muted">Loading date…</p>
      </article>

      <article class="card">
        <h2>Daily Note</h2>
        <p id="dailyQuote">Click for today’s small reminder.</p>
        <button id="newQuoteBtn" type="button">New reminder</button>
      </article>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
