<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — Dashboard</title>
<link rel="stylesheet" href="theme.css">
<style>
/* ── PAGE HEADER ── */
.todo-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

/* ── FILTER TABS ── */
.filter-row {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-tab {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 6px 10px;
  border: 2px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: color 0.12s, border-color 0.12s, background 0.12s;
}
.filter-tab:hover  { color: var(--text2); border-color: var(--muted); }
.filter-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(124,106,247,0.08); }
.filter-tab.active-pink  { color: var(--accent2); border-color: var(--accent2); background: rgba(247,106,138,0.08); }
.filter-tab.active-teal  { color: var(--accent3); border-color: var(--accent3); background: rgba(106,247,200,0.08); }
.filter-tab.active-amber { color: var(--amber); border-color: var(--amber); background: rgba(247,212,106,0.08); }

/* ── SORT ROW ── */
.sort-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.sort-row .px-label { flex-shrink: 0; }
.sort-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 4px 8px;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: color 0.12s, border-color 0.12s;
}
.sort-btn.active { color: var(--accent); border-color: var(--accent); }

/* ── STATS STRIP ── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 20px;
}
.stat-tile {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 10px 8px;
  text-align: center;
}
.stat-tile .st-num   { font-size: 16px; color: var(--accent); display: block; margin-bottom: 4px; }
.stat-tile .st-label { font-size: 5px; color: var(--muted); letter-spacing: 0.08em; line-height: 1.5; }
.stat-tile.teal  .st-num { color: var(--accent3); }
.stat-tile.pink  .st-num { color: var(--accent2); }
.stat-tile.amber .st-num { color: var(--amber); }

/* ── ADD FORM ── */
.add-form {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 14px;
  margin-bottom: 20px;
}
.add-form-title {
  font-size: 7px;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}
.add-main-row {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.add-main-row .px-input { flex: 1; min-width: 0; }

.add-meta-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.px-select-sm {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  background: var(--bg);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.12s;
}
.px-select-sm:focus { border-color: var(--accent); }

.prio-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.prio-dot {
  width: 12px; height: 12px;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: transform 0.1s;
  flex-shrink: 0;
}
.prio-dot:hover { transform: scale(1.2); }
.prio-dot[data-p="low"].sel    { background: var(--accent3); border-color: var(--accent3); }
.prio-dot[data-p="medium"].sel { background: var(--amber); border-color: var(--amber); }
.prio-dot[data-p="high"].sel   { background: var(--accent2); border-color: var(--accent2); }

/* ── TASK LIST ── */
.section-group { margin-bottom: 6px; }
.group-header {
  font-size: 6px;
  color: var(--muted);
  letter-spacing: 0.12em;
  padding: 8px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.group-count {
  background: var(--border);
  color: var(--muted);
  font-size: 6px;
  padding: 2px 6px;
}

.task-list { display: flex; flex-direction: column; gap: 4px; }

.task-item {
  background: var(--panel);
  border: 2px solid var(--border);
  border-left-width: 4px;
  padding: 10px 12px;
  display: grid;
  grid-template-columns: 20px 1fr auto;
  align-items: start;
  gap: 10px;
  transition: border-color 0.15s, opacity 0.2s;
  animation: px-slideUp 0.2s ease both;
  position: relative;
}
.task-item:hover { border-color: var(--muted); }
.task-item.done  { opacity: 0.45; }
.task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

/* Priority left border colours */
.task-item.p-low    { border-left-color: var(--accent3); }
.task-item.p-medium { border-left-color: var(--amber); }
.task-item.p-high   { border-left-color: var(--accent2); }

/* Checkbox */
.task-check {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  background: var(--bg);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background 0.1s, border-color 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.task-check:hover { border-color: var(--accent); }
.task-check.checked {
  background: var(--accent);
  border-color: var(--accent);
}
.task-check.checked::after {
  content: '';
  width: 10px; height: 6px;
  border-left: 2px solid #fff;
  border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.task-body { min-width: 0; }
.task-title { font-size: 8px; color: var(--text); line-height: 1.6; word-break: break-word; }
.task-meta  { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
.task-tag {
  font-size: 5px;
  padding: 2px 6px;
  border: 1px solid var(--border);
  color: var(--muted);
  letter-spacing: 0.06em;
}
.task-tag.cat-work     { border-color: #3b82f6; color: #93c5fd; }
.task-tag.cat-personal { border-color: var(--accent); color: var(--accent); }
.task-tag.cat-health   { border-color: var(--accent3); color: var(--accent3); }
.task-tag.cat-study    { border-color: var(--amber); color: var(--amber); }
.task-tag.cat-home     { border-color: #f97316; color: #fdba74; }
.task-tag.cat-other    { border-color: var(--border2); color: var(--muted); }

.task-due {
  font-size: 5px;
  color: var(--muted);
  padding: 2px 6px;
  border: 1px solid var(--border);
  letter-spacing: 0.04em;
}
.task-due.overdue { color: var(--accent2); border-color: var(--accent2); }
.task-due.today-due { color: var(--amber); border-color: var(--amber); }

.task-actions {
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
}
.task-del {
  background: none; border: none;
  color: var(--muted); font-size: 12px;
  cursor: pointer; line-height: 1; padding: 0;
  transition: color 0.12s;
}
.task-del:hover { color: var(--accent2); }

/* Priority indicator pip */
.task-prio-pip {
  width: 6px; height: 6px;
  border-radius: 0;
  flex-shrink: 0;
  margin-top: 8px;
}
.p-low    .task-prio-pip { background: var(--accent3); }
.p-medium .task-prio-pip { background: var(--amber); }
.p-high   .task-prio-pip { background: var(--accent2); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  font-size: 7px;
  color: var(--muted);
  letter-spacing: 0.08em;
  line-height: 2.5;
}
.empty-state .es-icon { font-size: 28px; display: block; margin-bottom: 12px; }

/* ── PET BANNER ── */
.pet-banner {
  background: #0d0a1a;
  border: 2px solid var(--accent);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}
.pet-banner .pb-icon { font-size: 22px; flex-shrink: 0; animation: px-idle 1.4s steps(2) infinite; }
.pet-banner .pb-text { font-size: 7px; color: var(--text2); line-height: 1.9; flex: 1; }
.pet-banner .pb-reward { font-size: 7px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; white-space: nowrap; letter-spacing: 0.06em; }

/* ── PROGRESS BAR TODAY ── */
.today-progress {
  margin-bottom: 20px;
}
.tp-header {
  display: flex;
  justify-content: space-between;
  font-size: 7px;
  color: var(--muted);
  margin-bottom: 5px;
}
.tp-header span:last-child { color: var(--accent); }

/* ── CELEBRATE ── */
@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
}
.confetti-piece {
  position: fixed;
  width: 6px; height: 6px;
  pointer-events: none;
  z-index: 9999;
  animation: confetti-fall 0.9s steps(8) forwards;
}
</style>
</head>
<body>

<div id="toast" class="px-toast"></div>

<div class="px-wrapper">

  <nav class="px-nav">
    <a href="index.html">HOME</a>
    <a href="todo.html" class="active">TASKS</a>
    <a href="planner.html">WEEK</a>
    <a href="habits.html">HABITS</a>
    <a href="focus.html">FOCUS</a>
    <a href="pet.html">PET</a>
  </nav>

  <div class="todo-header">
    <div>
      <h1 class="px-title px-title--purple">TASK LIST</h1>
      <p class="px-subtitle">// MISSION CONTROL</p>
    </div>
    <div id="petMini" style="font-size:7px; color:var(--accent); border:2px solid var(--accent); padding:6px 12px; letter-spacing:0.06em;">PET: ...</div>
  </div>

  <!-- PET BANNER -->
  <div class="pet-banner">
    <div class="pb-icon">🐾</div>
    <div class="pb-text">Complete a task → pet gets <strong style="color:var(--accent)">+8 Happiness · +5 XP</strong><br>All tasks done today → bonus <strong style="color:var(--accent3)">+15 XP!</strong></div>
    <div class="pb-reward" id="petRewardCount">+0 TODAY</div>
  </div>

  <!-- TODAY PROGRESS -->
  <div class="today-progress">
    <div class="tp-header">
      <span>TODAY'S PROGRESS</span>
      <span id="progressLabel">0 / 0</span>
    </div>
    <div class="px-bar" style="height:12px;">
      <div class="px-bar-fill px-bar-fill--purple" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- STATS STRIP -->
  <div class="stats-strip">
    <div class="stat-tile">
      <span class="st-num" id="statTotal">0</span>
      <span class="st-label">TOTAL</span>
    </div>
    <div class="stat-tile teal">
      <span class="st-num" id="statDone">0</span>
      <span class="st-label">DONE TODAY</span>
    </div>
    <div class="stat-tile amber">
      <span class="st-num" id="statPending">0</span>
      <span class="st-label">PENDING</span>
    </div>
    <div class="stat-tile pink">
      <span class="st-num" id="statOverdue">0</span>
      <span class="st-label">OVERDUE</span>
    </div>
  </div>

  <!-- ADD TASK FORM -->
  <div class="add-form">
    <div class="add-form-title">// ADD NEW TASK</div>
    <div class="add-main-row">
      <input class="px-input" id="taskInput" type="text" placeholder="WHAT NEEDS DOING..." maxlength="60" autocomplete="off" />
      <button class="px-btn px-btn--purple" onclick="addTask()">+ ADD</button>
    </div>
    <div class="add-meta-row">
      <!-- Priority picker -->
      <span class="px-label" style="font-size:6px;">PRIORITY:</span>
      <div class="prio-dots">
        <div class="prio-dot sel" data-p="low"    title="Low"    onclick="setPrio('low')"></div>
        <div class="prio-dot"    data-p="medium" title="Medium" onclick="setPrio('medium')"></div>
        <div class="prio-dot"    data-p="high"   title="High"   onclick="setPrio('high')"></div>
      </div>
      <!-- Category -->
      <select class="px-select-sm" id="taskCat">
        <option value="personal">PERSONAL</option>
        <option value="work">WORK</option>
        <option value="health">HEALTH</option>
        <option value="study">STUDY</option>
        <option value="home">HOME</option>
        <option value="other">OTHER</option>
      </select>
      <!-- Due date -->
      <input class="px-select-sm" id="taskDue" type="date" title="Due date (optional)"
        style="color:var(--muted); cursor:pointer;" />
    </div>
  </div>

  <!-- FILTER + SORT -->
  <div class="filter-row">
    <div class="filter-tab active"       data-f="all"      onclick="setFilter('all',this)">ALL</div>
    <div class="filter-tab"              data-f="pending"  onclick="setFilter('pending',this)">PENDING</div>
    <div class="filter-tab active-teal"  data-f="done"     onclick="setFilter('done',this)">DONE</div>
    <div class="filter-tab active-pink"  data-f="high"     onclick="setFilter('high',this)">!! HIGH</div>
    <div class="filter-tab active-amber" data-f="overdue"  onclick="setFilter('overdue',this)">OVERDUE</div>
  </div>

  <div class="sort-row">
    <span class="px-label">SORT:</span>
    <button class="sort-btn active" data-s="added"    onclick="setSort('added',this)">DATE ADDED</button>
    <button class="sort-btn"        data-s="priority" onclick="setSort('priority',this)">PRIORITY</button>
    <button class="sort-btn"        data-s="due"      onclick="setSort('due',this)">DUE DATE</button>
    <button class="sort-btn"        data-s="alpha"    onclick="setSort('alpha',this)">A–Z</button>
  </div>

  <!-- TASK LIST -->
  <div id="taskContainer"></div>

</div>

<script>
// ──────────────────────────────────────────────
// DATA
// localStorage: "tasks" → Task[]
// localStorage: "todayTasksDone" → number (for pet sync)
// ──────────────────────────────────────────────

let currentFilter = 'all';
let currentSort   = 'added';
let currentPrio   = 'low';

function uid()      { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function todayKey() { return new Date().toISOString().slice(0,10); }

function loadTasks() {
  try { return JSON.parse(localStorage.getItem('tasks')||'[]'); } catch(e) { return []; }
}
function saveTasks(t) { localStorage.setItem('tasks', JSON.stringify(t)); }

const PRIO_ORDER = { high:0, medium:1, low:2 };

// ── FILTER + SORT ──
function filterTasks(tasks) {
  const today = todayKey();
  switch(currentFilter) {
    case 'pending': return tasks.filter(t => !t.done);
    case 'done':    return tasks.filter(t => t.done);
    case 'high':    return tasks.filter(t => t.priority==='high' && !t.done);
    case 'overdue': return tasks.filter(t => !t.done && t.due && t.due < today);
    default:        return tasks;
  }
}
function sortTasks(tasks) {
  return [...tasks].sort((a,b) => {
    if (currentSort==='priority') return (PRIO_ORDER[a.priority]||2)-(PRIO_ORDER[b.priority]||2);
    if (currentSort==='due') {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (currentSort==='alpha') return a.text.localeCompare(b.text);
    return b.added - a.added; // newest first
  });
}

// ── RENDER ──
function render() {
  const all    = loadTasks();
  const today  = todayKey();
  const done   = all.filter(t=>t.done && t.doneDate===today).length;
  const pending= all.filter(t=>!t.done).length;
  const overdue= all.filter(t=>!t.done&&t.due&&t.due<today).length;

  // Stats
  document.getElementById('statTotal').textContent   = all.length;
  document.getElementById('statDone').textContent    = done;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statOverdue').textContent = overdue;

  // Progress
  const todayTasks = all.filter(t => t.addedDate===today || (t.done&&t.doneDate===today));
  const todayDone  = todayTasks.filter(t=>t.done&&t.doneDate===today).length;
  const todayTotal = todayTasks.length;
  const pct = todayTotal ? Math.round(todayDone/todayTotal*100) : 0;
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${todayDone} / ${todayTotal}`;

  // Pet reward count
  const petDone = parseInt(localStorage.getItem('todayTasksDone')||'0');
  document.getElementById('petRewardCount').textContent = `+${petDone} TODAY`;

  // Pet mood badge
  try {
    const p = JSON.parse(localStorage.getItem('petData')||'null');
    if (p) {
      const mood = p.health<25?'ILL 😰':p.happiness>75?'HAPPY 😄':p.energy<20?'TIRED 😴':'OKAY 🙂';
      document.getElementById('petMini').textContent = `PET: ${mood}`;
    }
  } catch(e){}

  // Filtered + sorted tasks
  const visible = sortTasks(filterTasks(all));
  const container = document.getElementById('taskContainer');
  container.innerHTML = '';

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <span class="es-icon">📋</span>
      ${currentFilter==='all'?'NO TASKS YET<br>ADD ONE ABOVE!':
        currentFilter==='done'?'NOTHING DONE YET<br>GET TO WORK!':
        currentFilter==='overdue'?'ALL CAUGHT UP!<br>NO OVERDUE TASKS 🎉':
        'NOTHING HERE!'}
    </div>`;
    return;
  }

  // Group by: pending / done
  const groups = currentFilter!=='all' ? [{ label:null, items:visible }] : [
    { label:'PENDING', items: visible.filter(t=>!t.done) },
    { label:'COMPLETED', items: visible.filter(t=>t.done) },
  ].filter(g=>g.items.length);

  groups.forEach((g, gi) => {
    const section = document.createElement('div');
    section.className = 'section-group';

    if (g.label) {
      const hdr = document.createElement('div');
      hdr.className = 'group-header';
      hdr.innerHTML = `<span>// ${g.label}</span><span class="group-count">${g.items.length}</span>`;
      section.appendChild(hdr);
    }

    const list = document.createElement('div');
    list.className = 'task-list';

    g.items.forEach((t, i) => {
      const el = buildTaskEl(t, today);
      el.style.animationDelay = (i*0.04)+'s';
      list.appendChild(el);
    });

    section.appendChild(list);
    container.appendChild(section);
  });
}

function buildTaskEl(t, today) {
  const isOverdue = !t.done && t.due && t.due < today;
  const isToday   = !t.done && t.due === today;
  const item = document.createElement('div');
  item.className = `task-item p-${t.priority||'low'}${t.done?' done':''}`;

  const check = document.createElement('div');
  check.className = 'task-check'+(t.done?' checked':'');
  check.onclick = () => toggleTask(t.id);

  const body = document.createElement('div');
  body.className = 'task-body';

  let metaHtml = `<span class="task-tag cat-${t.cat||'other'}">${(t.cat||'other').toUpperCase()}</span>`;
  if (t.priority==='high')   metaHtml += `<span class="task-tag" style="border-color:var(--accent2);color:var(--accent2);">!! HIGH</span>`;
  if (t.priority==='medium') metaHtml += `<span class="task-tag" style="border-color:var(--amber);color:var(--amber);">MED</span>`;
  if (t.due) {
    const cls = isOverdue?'overdue':isToday?'today-due':'';
    const label = isOverdue?'OVERDUE':isToday?'TODAY':t.due;
    metaHtml += `<span class="task-due ${cls}">${label}</span>`;
  }
  if (t.done && t.doneDate) metaHtml += `<span class="task-tag" style="color:var(--accent3);border-color:var(--accent3);">DONE ${t.doneDate===todayKey()?'TODAY':t.doneDate}</span>`;

  body.innerHTML = `<div class="task-title">${esc(t.text)}</div><div class="task-meta">${metaHtml}</div>`;

  const actions = document.createElement('div');
  actions.className = 'task-actions';
  const del = document.createElement('button');
  del.className = 'task-del';
  del.textContent = '×';
  del.title = 'Delete task';
  del.onclick = e => { e.stopPropagation(); deleteTask(t.id); };
  actions.appendChild(del);

  item.appendChild(check);
  item.appendChild(body);
  item.appendChild(actions);
  return item;
}

function esc(s){ return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── ADD TASK ──
function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  if (!text) { document.getElementById('taskInput').focus(); return; }
  const cat = document.getElementById('taskCat').value;
  const due = document.getElementById('taskDue').value || null;
  const tasks = loadTasks();
  tasks.push({
    id: uid(), text, priority: currentPrio, cat, due,
    done: false, added: Date.now(), addedDate: todayKey(), doneDate: null
  });
  saveTasks(tasks);
  document.getElementById('taskInput').value = '';
  document.getElementById('taskDue').value = '';
  render();
  showToast('TASK ADDED!');
}

// ── TOGGLE TASK ──
function toggleTask(id) {
  const tasks  = loadTasks();
  const idx    = tasks.findIndex(t=>t.id===id);
  if (idx<0) return;
  const task   = tasks[idx];
  const wasDone = task.done;
  task.done     = !wasDone;
  task.doneDate = task.done ? todayKey() : null;
  saveTasks(tasks);

  if (task.done) {
    rewardPet(task);
    const prev = parseInt(localStorage.getItem('todayTasksDone')||'0');
    localStorage.setItem('todayTasksDone', prev+1);
    showToast('TASK COMPLETE! PET +8 HAPPY');
    spawnConfetti();
    // Check all done bonus
    const remaining = loadTasks().filter(t=>!t.done && t.addedDate===todayKey()).length;
    if (remaining===0) {
      setTimeout(()=>{
        rewardPetBonus();
        showToast('ALL DONE! BONUS +15 XP FOR PET!');
      }, 600);
    }
  } else {
    const prev = Math.max(0, parseInt(localStorage.getItem('todayTasksDone')||'0')-1);
    localStorage.setItem('todayTasksDone', prev);
  }
  render();
}

// ── DELETE ──
function deleteTask(id) {
  saveTasks(loadTasks().filter(t=>t.id!==id));
  render();
}

// ── PRIORITY ──
function setPrio(p) {
  currentPrio = p;
  document.querySelectorAll('.prio-dot').forEach(d => {
    d.classList.toggle('sel', d.dataset.p===p);
  });
}

// ── FILTER ──
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.className = 'filter-tab' + (t.dataset.f===f ? ` active${f==='done'?' active-teal':f==='high'?' active-pink':f==='overdue'?' active-amber':''}` : '');
  });
  render();
}

// ── SORT ──
function setSort(s, el) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.s===s));
  render();
}

// ── PET INTEGRATION ──
function rewardPet(task) {
  try {
    const p = JSON.parse(localStorage.getItem('petData')||'null');
    if (!p) return;
    const cl = v => Math.max(0,Math.min(100,Math.round(v)));
    p.happiness = cl((p.happiness||80)+8);
    p.health    = cl((p.health||90)+2);
    p.xp        = (p.xp||0)+5;
    while(p.xp>=100){p.xp-=100;p.level=(p.level||1)+1;}
    const stages=['EGG','BABY','CHILD','TEEN','ADULT','MASTER'];
    const thresh=[1,3,6,10,15,20];
    for(let i=thresh.length-1;i>=0;i--){if(p.level>=thresh[i]){p.stage=stages[i];break;}}
    p.tasksToday=(p.tasksToday||0)+1;
    localStorage.setItem('petData',JSON.stringify(p));
  } catch(e){}
}
function rewardPetBonus() {
  try {
    const p = JSON.parse(localStorage.getItem('petData')||'null');
    if (!p) return;
    p.xp = (p.xp||0)+15;
    p.happiness = Math.min(100, Math.round((p.happiness||80)+10));
    while(p.xp>=100){p.xp-=100;p.level=(p.level||1)+1;}
    localStorage.setItem('petData',JSON.stringify(p));
  } catch(e){}
}

// ── CONFETTI ──
function spawnConfetti() {
  const colors = ['#7c6af7','#f76a8a','#6af7c8','#f7d46a'];
  for (let i=0;i<12;i++) {
    const d = document.createElement('div');
    d.className = 'confetti-piece';
    d.style.cssText = `left:${20+Math.random()*60}%; top:${80+Math.random()*10}%; background:${colors[i%4]}; animation-delay:${Math.random()*0.3}s;`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 1200);
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(()=>t.classList.remove('show'), 2300);
}

// ── KEYBOARD ──
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key==='Enter') addTask();
});

// ── INIT ──
render();
</script>
</body>
