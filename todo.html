<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="todo.css" />
  <title>To-Do</title>
</head>
<body>
  <main class="container">
    <header>
      <h1>To-Do List</h1>
      <p class="muted">Capture tasks, mark progress, and keep your day focused.</p>
      <nav>
        <a href="index.html">Home</a>
        <a href="pet.html">Tamagochi</a>
        <a href="story.html">Planner</a>
        <a href="rituals.html">Rituals</a>
        <a href="rules.html">Rules</a>
      </nav>
    </header>

    <section class="grid">
      <article class="card">
        <h2>Add a Task</h2>
        <form id="todoForm" class="todo-form">
          <label for="todoInput" class="muted">What do you want to do?</label>
          <div class="input-row">
            <input id="todoInput" type="text" placeholder="e.g., Read 10 pages" required maxlength="120" />
            <button type="submit">Add</button>
          </div>
        </form>
      </article>

      <article class="card">
        <h2>Your Tasks</h2>
        <p id="todoStats" class="muted">0 pending • 0 completed</p>
        <ul id="todoList" class="todo-list" aria-live="polite"></ul>
        <p id="emptyState" class="muted">No tasks yet. Add your first task above.</p>
      </article>
    </section>
  </main>

  <script src="todo.js"></script>
</body>
</html>
