<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Pet</title>
  <style>
    :root {
      --bg: #101423;
      --card: #1d2440;
      --accent: #c275c2;
      --text: #f2f2f7;
      --muted: #b5b8c9;
      --line: #353c5f;
      --good: #73d99f;
      --bad: #f2728b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Futura, "Futura", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1d2850 0%, var(--bg) 52%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .shell {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(145deg, #232c53, #171c36);
      padding: 22px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    p { margin: 8px 0 0 0; }

    .muted { color: var(--muted); }

    .layout {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 14px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 16px;
    }

    .pet-zone {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 270px;
      text-align: center;
    }

    .pet {
      font-size: clamp(3rem, 7vw, 5rem);
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.25));
      transition: transform 0.25s ease;
      user-select: none;
    }

    .pet.happy { transform: translateY(-5px) scale(1.02); }
    .pet.sad { transform: translateY(2px) scale(0.98); }

    .status {
      margin-top: 2px;
      font-size: 1.05rem;
      min-height: 1.5em;
    }

    .bars {
      display: grid;
      gap: 10px;
    }

    .bar-wrap {
      display: grid;
      gap: 5px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
    }

    .bar {
      width: 100%;
      height: 11px;
      border-radius: 999px;
      background: #0f1428;
      border: 1px solid #2f3660;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #8cc9ff);
      transition: width 0.25s ease;
    }

    .actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(2, minmax(120px, 1fr));
      gap: 9px;
    }

    button {
      border: 1px solid #4b5687;
      background: #28315a;
      color: var(--text);
      border-radius: 10px;
      padding: 9px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }

    button:hover { background: #323d70; }

    .meta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.92rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .tag-good { color: var(--good); }
    .tag-bad { color: var(--bad); }

    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>Pet Sanctuary</h1>
    <p class="muted">A tiny Tamagotchi-style pet. Keep it fed, clean, rested, and entertained.</p>

    <section class="layout">
      <article class="card pet-zone">
        <div id="pet" class="pet" aria-live="polite">🐣</div>
        <div id="moodText" class="status">Your pet has just hatched!</div>
        <div id="lifeText" class="muted">Age: 0 days</div>
      </article>

      <article class="card">
        <div class="bars" id="bars"></div>

        <div class="actions">
          <button id="feedBtn" type="button">🍓 Feed</button>
          <button id="playBtn" type="button">🎾 Play</button>
          <button id="sleepBtn" type="button">😴 Sleep</button>
          <button id="cleanBtn" type="button">🧼 Clean</button>
          <button id="healBtn" type="button">💊 Heal</button>
          <button id="resetBtn" type="button">🔄 New Pet</button>
        </div>

        <div class="meta">
          <span id="healthTag" class="tag-good">Healthy</span>
          <span id="tickTag">Time survived: 0m</span>
        </div>
      </article>
    </section>
  </main>

  <script>
    const MAX = 100;
    const clamp = (n) => Math.max(0, Math.min(MAX, n));

    const defaultState = {
      hunger: 70,
      fun: 65,
      energy: 75,
      hygiene: 80,
      health: 85,
      age: 0,
      minutes: 0,
      alive: true
    };

    const state = { ...defaultState };

    const pet = document.getElementById("pet");
    const moodText = document.getElementById("moodText");
    const lifeText = document.getElementById("lifeText");
    const healthTag = document.getElementById("healthTag");
    const tickTag = document.getElementById("tickTag");
    const bars = document.getElementById("bars");

    const stats = [
      ["hunger", "Hunger"],
      ["fun", "Fun"],
      ["energy", "Energy"],
      ["hygiene", "Hygiene"],
      ["health", "Health"]
    ];

    bars.innerHTML = stats.map(([key, label]) => `
      <div class="bar-wrap">
        <div class="bar-label"><span>${label}</span><span id="${key}Value"></span></div>
        <div class="bar"><div id="${key}Fill" class="fill"></div></div>
      </div>
    `).join("");

    function updateMood() {
      if (!state.alive) {
        pet.textContent = "👻";
        pet.className = "pet sad";
        moodText.textContent = "Oh no... your pet faded away. Press New Pet to hatch again.";
        healthTag.textContent = "Not alive";
        healthTag.className = "tag-bad";
        return;
      }

      const low = Object.entries(state)
        .filter(([k, v]) => ["hunger", "fun", "energy", "hygiene", "health"].includes(k) && v < 35)
        .map(([k]) => k);

      if (low.length === 0) {
        pet.textContent = "🐶";
        pet.className = "pet happy";
        moodText.textContent = "Your pet is thriving ✨";
        healthTag.textContent = "Healthy";
        healthTag.className = "tag-good";
      } else if (low.length <= 2) {
        pet.textContent = "🐱";
        pet.className = "pet";
        moodText.textContent = `Needs attention: ${low.join(", ")}.`;
        healthTag.textContent = "Needs care";
        healthTag.className = "muted";
      } else {
        pet.textContent = "🐹";
        pet.className = "pet sad";
        moodText.textContent = "Your pet is struggling. Act quickly!";
        healthTag.textContent = "Critical";
        healthTag.className = "tag-bad";
      }
    }

    function render() {
      stats.forEach(([key]) => {
        const value = Math.round(state[key]);
        document.getElementById(`${key}Value`).textContent = `${value}%`;
        document.getElementById(`${key}Fill`).style.width = `${value}%`;
      });

      lifeText.textContent = `Age: ${state.age} day${state.age === 1 ? "" : "s"}`;
      tickTag.textContent = `Time survived: ${state.minutes}m`;
      updateMood();
    }

    function applyChange(changes) {
      if (!state.alive) return;
      Object.entries(changes).forEach(([key, delta]) => {
        state[key] = clamp(state[key] + delta);
      });
      render();
    }

    document.getElementById("feedBtn").addEventListener("click", () => {
      applyChange({ hunger: 20, hygiene: -6, health: 2 });
    });

    document.getElementById("playBtn").addEventListener("click", () => {
      applyChange({ fun: 22, energy: -10, hunger: -6, health: 1 });
    });

    document.getElementById("sleepBtn").addEventListener("click", () => {
      applyChange({ energy: 24, hunger: -9, fun: -2, health: 2 });
    });

    document.getElementById("cleanBtn").addEventListener("click", () => {
      applyChange({ hygiene: 24, health: 3 });
    });

    document.getElementById("healBtn").addEventListener("click", () => {
      applyChange({ health: 16, energy: -4 });
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      Object.assign(state, defaultState);
      render();
    });

    setInterval(() => {
      if (!state.alive) return;

      applyChange({
        hunger: -5,
        fun: -4,
        energy: -3,
        hygiene: -3,
        health: -2
      });

      if (state.hunger < 20 || state.energy < 15 || state.hygiene < 15) {
        state.health = clamp(state.health - 3);
      }

      if (state.health <= 0 || (state.hunger <= 0 && state.energy <= 0)) {
        state.alive = false;
      }

      state.minutes += 1;
      if (state.minutes % 4 === 0) state.age += 1;
      render();
    }, 5000);

    render();
  </script>
</body>
</html>
