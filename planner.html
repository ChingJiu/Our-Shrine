<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:     #1a1714;
  --ink2:    #3d3730;
  --ink3:    #7a7268;
  --paper:   #f7f4ee;
  --paper2:  #f0ece3;
  --paper3:  #e8e2d6;
  --rule:    #ddd8cc;
  --red:     #c0392b;
  --blue:    #1a5fa8;
  --green:   #2e7d4f;
  --amber:   #b8860b;
  --purple:  #6b3fa0;
  --line-h:  48px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper3);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
}

/* Subtle paper texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent calc(var(--line-h) - 1px),
      rgba(0,0,0,0.04) calc(var(--line-h) - 1px),
      rgba(0,0,0,0.04) var(--line-h)
    );
  background-position: 0 80px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 0 80px;
}

/* ── NAV ── */
nav {
  background: var(--ink);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
nav a {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.45);
  text-decoration: none;
  padding: 14px 16px;
  text-transform: uppercase;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
nav a:hover { color: rgba(255,255,255,0.85); }
nav a.active { color: #fff; border-bottom-color: #fff; }
.nav-brand {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: #fff;
  margin-right: auto;
  letter-spacing: 0.05em;
}

/* ── HEADER ── */
.header {
  padding: 36px 32px 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.header-left h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.02em;
}
.header-left h1 em {
  font-style: italic;
  color: var(--ink3);
}
.week-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}
.week-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  min-width: 160px;
  text-align: center;
  letter-spacing: 0.05em;
}
.week-btn {
  background: none;
  border: 1px solid var(--rule);
  width: 32px; height: 32px;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink2);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}
.week-btn:hover { background: var(--paper3); }

/* ── CATEGORY LEGEND ── */
.legend {
  padding: 0 32px 20px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.legend-label {
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-right: 4px;
}
.cat-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--ink2);
  cursor: pointer;
  padding: 3px 8px;
  border: 1px solid var(--rule);
  background: var(--paper);
  transition: opacity 0.15s;
  letter-spacing: 0.04em;
}
.cat-pill .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-pill.faded { opacity: 0.3; }

/* ── WEEK GRID ── */
.grid-wrap {
  padding: 0 32px;
  overflow-x: auto;
}
.week-grid {
  display: grid;
  grid-template-columns: 56px repeat(7, minmax(0, 1fr));
  min-width: 640px;
  border-left: 1px solid var(--rule);
  border-top: 1px solid var(--rule);
}

/* Day headers */
.day-header {
  background: var(--paper);
  border-right: 1px solid var(--rule);
  border-bottom: 2px solid var(--ink);
  padding: 10px 8px 8px;
  text-align: center;
  position: sticky;
  top: 44px;
  z-index: 10;
}
.day-header.corner { background: var(--paper); }
.day-name {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
}
.day-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
}
.day-header.today .day-num {
  color: var(--red);
}
.day-header.today .day-name {
  color: var(--red);
}

/* Time slots */
.time-label {
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 4px 6px 0;
  text-align: right;
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 0.04em;
  height: var(--line-h);
  vertical-align: top;
  position: relative;
  top: -6px;
  background: var(--paper);
}
.time-label.half {
  border-bottom: 1px dashed var(--rule);
  font-size: 0;
  background: var(--paper2);
}

.slot {
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  height: var(--line-h);
  position: relative;
  background: var(--paper);
  cursor: pointer;
  transition: background 0.1s;
}
.slot:hover { background: var(--paper2); }
.slot.half-hour {
  border-bottom: 1px dashed rgba(0,0,0,0.06);
  background: var(--paper2);
}
.slot.half-hour:hover { background: var(--paper3); }

/* ── EVENTS ── */
.event {
  position: absolute;
  left: 2px; right: 2px;
  top: 2px;
  border-radius: 2px;
  padding: 3px 6px;
  font-size: 10px;
  font-weight: 500;
  line-height: 1.3;
  overflow: hidden;
  cursor: pointer;
  z-index: 5;
  transition: filter 0.12s;
  border-left: 3px solid rgba(0,0,0,0.2);
}
.event:hover { filter: brightness(0.92); }
.event .ev-title { display: block; font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event .ev-time  { display: block; font-size: 8px; opacity: 0.75; margin-top: 1px; }

/* Category colours */
.cat-work    { background: #dbeafe; color: #1e40af; border-left-color: #3b82f6; }
.cat-health  { background: #dcfce7; color: #166534; border-left-color: #22c55e; }
.cat-study   { background: #fef9c3; color: #854d0e; border-left-color: #eab308; }
.cat-social  { background: #fce7f3; color: #9d174d; border-left-color: #ec4899; }
.cat-personal{ background: #ede9fe; color: #4c1d95; border-left-color: #8b5cf6; }
.cat-other   { background: #f3f4f6; color: #374151; border-left-color: #9ca3af; }

/* ── PET STRIP ── */
.pet-strip {
  margin: 24px 32px 0;
  background: var(--ink);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 10px;
  letter-spacing: 0.06em;
}
.pet-strip .pet-icon { font-size: 20px; }
.pet-strip .pet-msg { color: rgba(255,255,255,0.7); flex: 1; }
.pet-strip .pet-reward {
  color: #6af7c8;
  font-size: 9px;
  border: 1px solid #6af7c8;
  padding: 4px 10px;
  cursor: pointer;
  transition: background 0.12s;
}
.pet-strip .pet-reward:hover { background: rgba(106,247,200,0.1); }

/* ── MODAL ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.55);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }

.modal {
  background: var(--paper);
  border: 1px solid var(--rule);
  width: 360px;
  max-width: calc(100vw - 32px);
  padding: 0;
  box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
}
.modal-head {
  background: var(--ink);
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h2 {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 400;
  font-style: italic;
}
.modal-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: #fff; }

.modal-body { padding: 20px; }

.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--rule);
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.12s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--ink2);
}
.form-textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.cat-select { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-opt {
  font-size: 9px;
  padding: 4px 10px;
  border: 1px solid var(--rule);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.12s;
  display: flex; align-items: center; gap: 5px;
}
.cat-opt input { display: none; }
.cat-opt.selected { border-color: var(--ink); background: var(--ink); color: #fff; }

.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  gap: 8px;
}
.btn-primary {
  background: var(--ink);
  color: #fff;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 9px 20px;
  cursor: pointer;
  transition: opacity 0.12s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-ghost {
  background: none;
  color: var(--ink3);
  border: 1px solid var(--rule);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.12s;
}
.btn-ghost:hover { background: var(--paper3); }
.btn-danger {
  background: none;
  color: var(--red);
  border: 1px solid rgba(192,57,43,0.3);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 9px 14px;
  cursor: pointer;
}
.btn-danger:hover { background: rgba(192,57,43,0.06); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: #fff;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 10px 20px;
  z-index: 500;
  transition: transform 0.25s ease;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── WEEKLY SUMMARY ── */
.summary-bar {
  padding: 12px 32px 0;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.summary-pill {
  font-size: 10px;
  color: var(--ink3);
  border: 1px solid var(--rule);
  padding: 4px 12px;
  background: var(--paper);
}
.summary-pill strong {
  color: var(--ink);
  font-weight: 500;
  margin-right: 4px;
}

@keyframes slideUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}
.week-grid { animation: slideUp 0.3s ease; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New event</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input class="form-input" id="evTitle" type="text" placeholder="What's happening?" />
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-select" id="catSelect">
          <label class="cat-opt selected" data-cat="work">    <input type="radio" name="cat" value="work"     checked> Work</label>
          <label class="cat-opt"          data-cat="health">  <input type="radio" name="cat" value="health">        Health</label>
          <label class="cat-opt"          data-cat="study">   <input type="radio" name="cat" value="study">         Study</label>
          <label class="cat-opt"          data-cat="social">  <input type="radio" name="cat" value="social">        Social</label>
          <label class="cat-opt"          data-cat="personal"><input type="radio" name="cat" value="personal">      Personal</label>
          <label class="cat-opt"          data-cat="other">   <input type="radio" name="cat" value="other">         Other</label>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start time</label>
          <input class="form-input" id="evStart" type="time" value="09:00" />
        </div>
        <div class="form-group">
          <label class="form-label">End time</label>
          <input class="form-input" id="evEnd" type="time" value="10:00" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-textarea" id="evNotes" placeholder="Any details..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDelete" onclick="deleteEvent()" style="display:none">Delete</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveEvent()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="page">

  <nav>
    <span class="nav-brand">✦ Dashboard</span>
    <a href="index.html">Home</a>
    <a href="todo.html">Tasks</a>
    <a href="planner.html" class="active">Week</a>
    <a href="habits.html">Habits</a>
    <a href="focus.html">Focus</a>
    <a href="pet.html">Pet</a>
  </nav>

  <div class="header">
    <div class="header-left">
      <h1>Weekly <em>Planner</em></h1>
    </div>
    <div class="week-nav">
      <button class="week-btn" onclick="shiftWeek(-1)">&#8592;</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="week-btn" onclick="shiftWeek(1)">&#8594;</button>
      <button class="week-btn" onclick="goToday()" title="Today" style="font-size:10px;width:auto;padding:0 10px;letter-spacing:0.06em;">TODAY</button>
    </div>
  </div>

  <div class="legend">
    <span class="legend-label">Filter:</span>
    <div class="cat-pill" data-cat="work"     onclick="toggleFilter('work')">    <span class="dot" style="background:#3b82f6"></span>Work</div>
    <div class="cat-pill" data-cat="health"   onclick="toggleFilter('health')">  <span class="dot" style="background:#22c55e"></span>Health</div>
    <div class="cat-pill" data-cat="study"    onclick="toggleFilter('study')">   <span class="dot" style="background:#eab308"></span>Study</div>
    <div class="cat-pill" data-cat="social"   onclick="toggleFilter('social')">  <span class="dot" style="background:#ec4899"></span>Social</div>
    <div class="cat-pill" data-cat="personal" onclick="toggleFilter('personal')"><span class="dot" style="background:#8b5cf6"></span>Personal</div>
    <div class="cat-pill" data-cat="other"    onclick="toggleFilter('other')">   <span class="dot" style="background:#9ca3af"></span>Other</div>
  </div>

  <div class="summary-bar" id="summaryBar"></div>

  <div class="grid-wrap" style="margin-top:16px;">
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="pet-strip">
    <span class="pet-icon">🐾</span>
    <span class="pet-msg">Plan your week and your pet earns <strong>+5 Happiness</strong> per event added!</span>
    <span class="pet-reward" onclick="syncPet()">SYNC PET</span>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Hours shown: 07:00 – 22:00 (each hour = 2 rows: :00 and :30)
const START_H = 7, END_H = 22;

let weekOffset = 0;   // 0 = current week
let editingId  = null;
let pendingSlot = null; // { dayIndex, hour, minute }
let activeFilters = new Set(); // empty = all shown

function loadEvents() {
  try { return JSON.parse(localStorage.getItem('plannerEvents') || '[]'); }
  catch(e) { return []; }
}
function saveEvents(evs) {
  localStorage.setItem('plannerEvents', JSON.stringify(evs));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─────────────────────────────────────────────
// WEEK MATHS
// ─────────────────────────────────────────────
function getWeekStart(offset) {
  const now = new Date();
  const day = now.getDay(); // 0 Sun
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + offset * 7); // Monday-based
  mon.setHours(0,0,0,0);
  return mon;
}

function weekDays(offset) {
  const start = getWeekStart(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });
}

function dateKey(d) {
  return d.toISOString().slice(0,10);
}

function todayKey() { return dateKey(new Date()); }

// ─────────────────────────────────────────────
// RENDER GRID
// ─────────────────────────────────────────────
function render() {
  const days  = weekDays(weekOffset);
  const events = loadEvents();
  const grid  = document.getElementById('weekGrid');
  grid.innerHTML = '';

  // Week label
  const ws = days[0], we = days[6];
  document.getElementById('weekLabel').textContent =
    `${ws.getDate()} ${MONTHS[ws.getMonth()]} – ${we.getDate()} ${MONTHS[we.getMonth()]} ${we.getFullYear()}`;

  // ── HEADER ROW ──
  const corner = el('div', 'day-header corner');
  grid.appendChild(corner);

  days.forEach((d,i) => {
    const hdr = el('div', 'day-header' + (dateKey(d)===todayKey()?' today':''));
    hdr.innerHTML = `<div class="day-name">${DAYS[(i+1)%7]}</div><div class="day-num">${d.getDate()}</div>`;
    grid.appendChild(hdr);
  });

  // ── TIME ROWS ──
  for (let h = START_H; h < END_H; h++) {
    [0, 30].forEach(min => {
      const isHalf = min === 30;

      // Time label
      const lbl = el('div', 'time-label' + (isHalf?' half':''));
      lbl.textContent = isHalf ? '' : `${String(h).padStart(2,'0')}:00`;
      grid.appendChild(lbl);

      // Day slots
      days.forEach((d, di) => {
        const slot = el('div', 'slot' + (isHalf?' half-hour':''));
        slot.dataset.day  = di;
        slot.dataset.hour = h;
        slot.dataset.min  = min;
        slot.title = `Add event ${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')} on ${DAYS[(di+1)%7]}`;
        slot.addEventListener('click', e => {
          if (e.target.classList.contains('event') || e.target.closest('.event')) return;
          openModal(null, { dayIndex: di, date: dateKey(d), hour: h, minute: min });
        });

        // Render events in this slot
        const slotEvents = events.filter(ev => {
          if (ev.date !== dateKey(d)) return false;
          if (activeFilters.size && !activeFilters.has(ev.cat)) return false;
          const [sh, sm] = ev.start.split(':').map(Number);
          return sh === h && (min === 0 ? sm < 30 : sm >= 30);
        });

        slotEvents.forEach(ev => {
          const [sh,sm] = ev.start.split(':').map(Number);
          const [eh,em] = ev.end.split(':').map(Number);
          const totalMins = (eh*60+em) - (sh*60+sm);
          const heightPx = Math.max(22, (totalMins / 30) * 48 - 4);

          const evEl = el('div', 'event cat-' + (ev.cat||'other'));
          evEl.style.height = heightPx + 'px';
          evEl.innerHTML = `<span class="ev-title">${esc(ev.title)}</span><span class="ev-time">${ev.start}–${ev.end}</span>`;
          evEl.title = ev.notes || ev.title;
          evEl.addEventListener('click', e => { e.stopPropagation(); openModal(ev.id); });
          slot.appendChild(evEl);
        });

        grid.appendChild(slot);
      });
    });
  }

  renderSummary(events, days);
}

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}
function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─────────────────────────────────────────────
// SUMMARY BAR
// ─────────────────────────────────────────────
function renderSummary(events, days) {
  const keys = new Set(days.map(dateKey));
  const weekEvs = events.filter(e => keys.has(e.date));
  const cats = {};
  weekEvs.forEach(e => { cats[e.cat] = (cats[e.cat]||0)+1; });
  const bar = document.getElementById('summaryBar');
  bar.innerHTML = `<div class="summary-pill"><strong>${weekEvs.length}</strong> events this week</div>` +
    Object.entries(cats).map(([c,n]) =>
      `<div class="summary-pill"><strong>${n}</strong> ${c}</div>`
    ).join('');
}

// ─────────────────────────────────────────────
// WEEK NAV
// ─────────────────────────────────────────────
function shiftWeek(d) { weekOffset += d; render(); }
function goToday()    { weekOffset = 0;  render(); }

// ─────────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────────
function toggleFilter(cat) {
  const pill = document.querySelector(`.cat-pill[data-cat="${cat}"]`);
  if (activeFilters.has(cat)) {
    activeFilters.delete(cat);
    pill && pill.classList.remove('faded');
  } else {
    activeFilters.add(cat);
    // fade others
    document.querySelectorAll('.cat-pill').forEach(p => {
      p.classList.toggle('faded', activeFilters.size > 0 && !activeFilters.has(p.dataset.cat));
    });
  }
  if (activeFilters.size === 0) {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('faded'));
  }
  render();
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(id, slot) {
  editingId   = id || null;
  pendingSlot = slot || null;

  const events = loadEvents();
  const ev = id ? events.find(e => e.id === id) : null;

  document.getElementById('modalTitle').textContent = ev ? 'Edit event' : 'New event';
  document.getElementById('evTitle').value  = ev ? ev.title : '';
  document.getElementById('evNotes').value  = ev ? (ev.notes||'') : '';
  document.getElementById('evStart').value  = ev ? ev.start : (slot ? `${String(slot.hour).padStart(2,'0')}:${String(slot.minute).padStart(2,'0')}` : '09:00');
  document.getElementById('evEnd').value    = ev ? ev.end   : addHour(document.getElementById('evStart').value, 1);
  document.getElementById('btnDelete').style.display = ev ? 'block' : 'none';

  // Cat select
  const cat = ev ? ev.cat : 'work';
  document.querySelectorAll('#catSelect .cat-opt').forEach(opt => {
    const sel = opt.dataset.cat === cat;
    opt.classList.toggle('selected', sel);
    opt.querySelector('input').checked = sel;
  });

  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('evTitle').focus(), 50);
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  editingId = null; pendingSlot = null;
}

function addHour(timeStr, h) {
  const [hh, mm] = timeStr.split(':').map(Number);
  const total = hh*60 + mm + h*60;
  return `${String(Math.min(Math.floor(total/60),23)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

// Cat option click
document.querySelectorAll('#catSelect .cat-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('#catSelect .cat-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    opt.querySelector('input').checked = true;
  });
});

function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { document.getElementById('evTitle').focus(); return; }

  const cat   = document.querySelector('#catSelect .cat-opt.selected')?.dataset.cat || 'other';
  const start = document.getElementById('evStart').value;
  const end   = document.getElementById('evEnd').value;
  const notes = document.getElementById('evNotes').value.trim();

  const days  = weekDays(weekOffset);
  const date  = pendingSlot ? pendingSlot.date : (editingId ? loadEvents().find(e=>e.id===editingId)?.date : dateKey(days[0]));

  const events = loadEvents();
  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx > -1) events[idx] = { ...events[idx], title, cat, start, end, notes };
  } else {
    events.push({ id: uid(), date, title, cat, start, end, notes });
    rewardPet('plan');
    showToast('Event added · pet rewarded +5 happiness');
  }
  saveEvents(events);
  closeModal();
  render();
}

function deleteEvent() {
  if (!editingId) return;
  const events = loadEvents().filter(e => e.id !== editingId);
  saveEvents(events);
  closeModal();
  render();
  showToast('Event deleted');
}

// Close modal on backdrop click
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────────────────────────
// PET INTEGRATION
// ─────────────────────────────────────────────
function rewardPet(type) {
  try {
    const raw = localStorage.getItem('petData');
    if (!raw) return;
    const p = JSON.parse(raw);
    const r = { plan: { happiness:5, health:2, xp:3 } }[type];
    if (!r) return;
    const cl = v => Math.max(0, Math.min(100, Math.round(v)));
    p.happiness = cl((p.happiness||80) + r.happiness);
    p.health    = cl((p.health||90)    + r.health);
    p.xp        = (p.xp||0) + r.xp;
    while (p.xp >= 100) { p.xp -= 100; p.level = (p.level||1)+1; }
    localStorage.setItem('petData', JSON.stringify(p));
  } catch(e) {}
}

function syncPet() {
  const events = loadEvents();
  const days   = weekDays(weekOffset);
  const keys   = new Set(days.map(dateKey));
  const count  = events.filter(e => keys.has(e.date)).length;
  for (let i = 0; i < Math.min(count, 5); i++) rewardPet('plan');
  showToast(`Pet synced! ${Math.min(count,5)} events rewarded this week`);
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();
</script>
